name: Android Release

# Builds Pause and publishes a GitHub RELEASE (visible under the repo's "Releases" tab and in
# the GitHub mobile app) with the APK attached, when you push a tag like `v1.0.0`.
#
# Signing: add these repository secrets (Settings → Secrets and variables → Actions) to get a
# proper SIGNED release (applicationId com.pause.app):
#   KEYSTORE_BASE64    base64 of your release keystore
#   KEYSTORE_PASSWORD  keystore password
#   KEY_ALIAS          key alias
#   KEY_PASSWORD       key password
#
# IMPORTANT: KEYSTORE_BASE64 must be CLEAN base64 with no headers/line-wrapping. On Windows:
#   [Convert]::ToBase64String([IO.File]::ReadAllBytes("C:\path\to\release.keystore")) | Set-Clipboard
#
# If the keystore is missing or invalid, the job does NOT fail — it builds an installable debug
# APK instead and still publishes the Release (clearly labelled), so you always get something.

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # required to create the GitHub Release

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Ensure Gradle wrapper exists
        run: |
          if [ ! -f gradle/wrapper/gradle-wrapper.jar ]; then
            gradle wrapper --gradle-version 8.10.2
          fi
          chmod +x gradlew

      - name: Decode & verify keystore
        id: keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "::warning::No KEYSTORE_BASE64 secret — building an installable debug APK instead."
            echo "signed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Strip ALL whitespace (handles copy-paste line wraps / CRLF), then decode tolerantly.
          printf '%s' "$KEYSTORE_BASE64" | tr -d '[:space:]' | base64 -d > "$RUNNER_TEMP/release.keystore" 2>/dev/null || true
          if [ -s "$RUNNER_TEMP/release.keystore" ] && \
             keytool -list -keystore "$RUNNER_TEMP/release.keystore" -storepass "$KEYSTORE_PASSWORD" >/dev/null 2>&1; then
            echo "Keystore decoded and verified OK."
            echo "signed=true" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::KEYSTORE_BASE64 is not a valid keystore (or KEYSTORE_PASSWORD is wrong). Building a debug APK fallback. Re-encode with the PowerShell command in this file's header."
            echo "signed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest --no-daemon --stacktrace

      - name: Build
        env:
          KEYSTORE_FILE: ${{ runner.temp }}/release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ "${{ steps.keystore.outputs.signed }}" = "true" ]; then
            ./gradlew assembleRelease bundleRelease --no-daemon --stacktrace
          else
            ./gradlew assembleDebug --no-daemon --stacktrace
          fi

      - name: Collect outputs
        run: |
          mkdir -p dist
          cp app/build/outputs/apk/release/*.apk dist/ 2>/dev/null || true
          cp app/build/outputs/bundle/release/*.aab dist/ 2>/dev/null || true
          cp app/build/outputs/apk/debug/*.apk   dist/ 2>/dev/null || true
          echo "Artifacts to publish:"; ls -la dist

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SIGNED: ${{ steps.keystore.outputs.signed }}
        run: |
          TAG="${{ github.ref_name }}"
          if [ "$SIGNED" = "true" ]; then
            NOTES="Signed release build of **Pause** (\`com.pause.app\`). Download the \`.apk\` below and install it on your phone (allow installs from unknown sources). The \`.aab\` is for Google Play upload."
          else
            NOTES="⚠️ Installable **debug** build (\`com.pause.app.debug\`) — published because \`KEYSTORE_BASE64\` was missing or invalid. It installs and runs fine. For a proper signed release, fix the keystore secret (see the workflow file header for the exact PowerShell command) and re-push the tag."
          fi
          # Idempotent: replace any existing release for this tag (keeps the tag itself).
          gh release delete "$TAG" --yes 2>/dev/null || true
          gh release create "$TAG" --title "Pause $TAG" --notes "$NOTES" dist/*

      - name: Upload artifacts (manual runs)
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: pause-release
          path: dist/*
          if-no-files-found: error
