name: Android Release

# Builds a signed release APK + AAB in the cloud — no local Android SDK needed.
# Trigger by pushing a tag like `v1.0.0`, or manually from the Actions tab.
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   KEYSTORE_BASE64     base64 of your release keystore  (base64 -w0 release.keystore)
#   KEYSTORE_PASSWORD   keystore password
#   KEY_ALIAS           key alias (e.g. pause)
#   KEY_PASSWORD        key password
#
# If the secrets are absent the build still runs and produces an UNSIGNED release APK.

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Ensure Gradle wrapper exists
        run: |
          if [ ! -f gradle/wrapper/gradle-wrapper.jar ]; then
            gradle wrapper --gradle-version 8.10.2
          fi
          chmod +x gradlew

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "No KEYSTORE_BASE64 secret set — the release APK/AAB will be unsigned."
            exit 0
          fi
          # Strip any stray CR/LF/spaces before decoding so a copy-pasted secret can't break it.
          printf '%s' "$KEYSTORE_BASE64" | tr -d '\r\n ' | base64 -d > "$RUNNER_TEMP/release.keystore"
          test -s "$RUNNER_TEMP/release.keystore" && echo "keystore decoded ($(wc -c < "$RUNNER_TEMP/release.keystore") bytes)"

      - name: Run unit tests
        run: ./gradlew testReleaseUnitTest --no-daemon --stacktrace

      - name: Build signed APK and AAB
        env:
          KEYSTORE_FILE: ${{ runner.temp }}/release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease bundleRelease --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: pause-release-apk
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: error

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: pause-release-aab
          path: app/build/outputs/bundle/release/*.aab
          if-no-files-found: error
